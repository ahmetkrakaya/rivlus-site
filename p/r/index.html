<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>TCR Avantaj Doğrulama</title>
  <style>
    :root {
      --brand: #1B4332;
      --bg: #f4f6f8;
      --text: #111827;
      --muted: #6b7280;
      --success: #15803d;
      --error: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .header {
      padding: 28px 24px 20px;
      text-align: center;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), color-mix(in srgb, var(--brand) 75%, #000));
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255,255,255,.12);
      margin: 0 auto 12px;
      display: block;
      padding: 10px;
    }
    .logo-fallback {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      font-size: 28px;
    }
    .partner { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
    .discount { opacity: .9; font-size: 15px; margin: 0; }
    .body { padding: 28px 24px 32px; text-align: center; }
    .status-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      font-size: 32px;
    }
    .status-icon.ok { background: #ecfdf3; color: var(--success); }
    .status-icon.err { background: #fef2f2; color: var(--error); }
    .status-icon.wait { background: #eef2ff; color: #4338ca; }
    .message {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.35;
      margin: 0 0 8px;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }
    .member {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f9fafb;
      font-size: 14px;
      color: var(--muted);
    }
    .member strong { color: var(--text); }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <main class="card" id="app">
    <div class="header" id="header">
      <div class="logo-fallback" id="logoFallback">☕</div>
      <img class="logo" id="logo" alt="" hidden />
      <h1 class="partner" id="partnerName">TCR Avantaj</h1>
      <p class="discount" id="discountLabel">Doğrulanıyor…</p>
    </div>
    <div class="body">
      <div class="status-icon wait" id="statusIcon">⏳</div>
      <p class="message" id="message">Kod kontrol ediliyor</p>
      <p class="sub" id="sub">Lütfen bekleyin</p>
      <div class="member" id="memberBox" hidden>
        Üye: <strong id="memberName"></strong>
      </div>
      <p class="footer">Twenty City Runners · rivlus.com</p>
    </div>
  </main>

  <script>
    (function () {
      var API_URL = window.__PARTNER_REDEEM_API__ ||
        "https://lnodjfivycpyoytmwpcn.supabase.co/functions/v1/partner-redeem";

      function parseToken() {
        var path = window.location.pathname.replace(/\/+$/, "");
        var parts = path.split("/");
        var idx = parts.indexOf("r");
        if (idx >= 0 && parts[idx + 1]) return parts[idx + 1];
        var params = new URLSearchParams(window.location.search);
        return params.get("token") || "";
      }

      function setBrand(color) {
        if (!color) return;
        document.documentElement.style.setProperty("--brand", color);
      }

      function renderLoading() {
        document.getElementById("message").textContent = "Kod kontrol ediliyor";
        document.getElementById("sub").textContent = "Lütfen bekleyin";
      }

      function renderResult(data) {
        var ok = !!data.success;
        var icon = document.getElementById("statusIcon");
        icon.className = "status-icon " + (ok ? "ok" : "err");
        icon.textContent = ok ? "✓" : "✕";

        document.getElementById("message").textContent =
          data.message || (ok ? "İşlem başarılı" : "İşlem reddedildi");

        document.getElementById("sub").textContent = ok
          ? (data.discount_label || "")
          : "Müşteriden uygulamada ekranı yenilemesini isteyebilirsiniz.";

        if (data.partner_name) {
          document.getElementById("partnerName").textContent = data.partner_name;
        }
        if (data.discount_label) {
          document.getElementById("discountLabel").textContent = data.discount_label;
        }
        if (data.brand_color) setBrand(data.brand_color);

        if (data.logo_url) {
          var img = document.getElementById("logo");
          img.src = data.logo_url;
          img.hidden = false;
          document.getElementById("logoFallback").hidden = true;
        }

        if (data.member_name) {
          document.getElementById("memberBox").hidden = false;
          document.getElementById("memberName").textContent = data.member_name;
        }
      }

      function renderError(msg) {
        document.getElementById("statusIcon").className = "status-icon err";
        document.getElementById("statusIcon").textContent = "✕";
        document.getElementById("message").textContent = msg || "Bağlantı hatası";
        document.getElementById("sub").textContent = "Tekrar deneyin veya müşteriden QR'ı yenilemesini isteyin.";
      }

      var token = parseToken();
      if (!token) {
        renderError("Geçersiz bağlantı");
        return;
      }

      renderLoading();
      fetch(API_URL + "?token=" + encodeURIComponent(token), {
        method: "GET",
        headers: { Accept: "application/json" },
      })
        .then(function (res) { return res.json(); })
        .then(renderResult)
        .catch(function () { renderError("Sunucuya ulaşılamadı"); });
    })();
  </script>
</body>
</html>
